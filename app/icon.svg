<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark circle background -->
  <circle cx="32" cy="32" r="32" fill="#222222"/>
  <!-- Sofa back (tall rounded rectangle) -->
  <rect x="14" y="20" width="36" height="13" rx="4" fill="white"/>
  <!-- Left armrest (tall, overlaps seat) -->
  <rect x="11" y="26" width="7" height="16" rx="3" fill="white"/>
  <!-- Right armrest -->
  <rect x="46" y="26" width="7" height="16" rx="3" fill="white"/>
  <!-- Seat -->
  <rect x="15" y="33" width="34" height="10" rx="2" fill="white"/>
  <!-- Left leg -->
  <rect x="17" y="42" width="4" height="6" rx="1.5" fill="white"/>
  <!-- Right leg -->
  <rect x="43" y="42" width="4" height="6" rx="1.5" fill="white"/>
</svg>
